<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Background</title>
<style>
  :root {
    --bg: #06070f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    overflow: hidden;
  }

  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<script>
// Three.js-style WebGL starfield via canvas
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

let W, H, stars = [], mouse = { x: 0, y: 0 };
const STAR_COUNT = 90;
const CONN_DIST = 140;
const ACCENT = [91, 110, 245];
const TEAL = [0, 229, 195];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.6 + 0.4,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      bright: Math.random(),
      phase: Math.random() * Math.PI * 2,
      color: Math.random() > 0.5 ? ACCENT : TEAL,
    });
  }
}

function draw(t) {
  ctx.clearRect(0, 0, W, H);

  // Update + draw connections
  for (let i = 0; i < stars.length; i++) {
    const a = stars[i];
    for (let j = i + 1; j < stars.length; j++) {
      const b = stars[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < CONN_DIST) {
        const alpha = (1 - dist / CONN_DIST) * 0.25;
        const c = a.color;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${alpha})`;
        ctx.lineWidth = 0.5;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  // Mouse connections
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    const dx = s.x - mouse.x, dy = s.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 180) {
      const alpha = (1 - dist / 180) * 0.55;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(0,229,195,${alpha})`;
      ctx.lineWidth = 0.8;
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(mouse.x, mouse.y);
      ctx.stroke();
    }
  }

  // Draw stars
  for (let i = 0; i < stars.length; i++) {
    const s = stars[i];
    const twinkle = 0.5 + 0.5 * Math.sin(t * 0.001 + s.phase);
    const alpha = 0.4 + 0.5 * twinkle;
    const [r, g, b] = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fill();

    // Glow halo
    const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
    grd.addColorStop(0, `rgba(${r},${g},${b},${0.15 * twinkle})`);
    grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Move
    s.x += s.vx;
    s.y += s.vy;
    if (s.x < -10) s.x = W + 10;
    if (s.x > W + 10) s.x = -10;
    if (s.y < -10) s.y = H + 10;
    if (s.y > H + 10) s.y = -10;
  }

  requestAnimationFrame(draw);
}

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('resize', () => { resize(); initStars(); });

resize();
initStars();
requestAnimationFrame(draw);
</script>

</body>
</html>
